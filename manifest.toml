packaging_format = 2

id = "hash-calendar"
name = "hash-calendar"
description.en = "Lightweight calendar app where the data lives in the URL hash"
description.fr = "Application légère de calendrier où les données résident dans le hash d'URL"

version = "2026.03.05~ynh1"

maintainers = ["oleole39"]

[upstream]
license = "MIT"
demo = "https://hash-calendar.netlify.app"
userdoc = "https://github.com/supunlakmal/hash-calendar?tab=readme-ov-file#json-bridge-jsonhtml"
code = "https://github.com/supunlakmal/hash-calendar"

[integration]
yunohost = ">= 11.2.30"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "20M"
ram.build = "0M"
ram.runtime = "0M"


[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/hash-calendar"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

        [resources.sources.main]
        url = "https://github.com/supunlakmal/hash-calendar/archive/78a416d409a1de322004c94d17387833ec610a69.tar.gz"
        sha256 = "eb9f68e8a09c54a095bff41f79d8ec8627435e17ed93366a64aef9c416188ea8"
        extract = true
        in_subdir = true
        autoupdate.strategy = "latest_github_commit"

    [resources.system_user]

    [resources.install_dir]
    group = "www-data:r-x"

    [resources.permissions]
    main.url = "/"
